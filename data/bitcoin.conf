server=1
dbcache=8192 (CHANGE TO MATCH YOUR RAM)
maxconnections=70
maxuploadtarget=0

# RPC credentials (safe defaults — change if you want)
rpcuser=CHANGEME
rpcpassword=CHANGEME

# Allow local access only
rpcallowip=127.0.0.1

# BSV default RPC port
rpcport=8336
port=8335

# Node settings
txindex=0
prune=550

# Networking
listen=1

# --- BSV Mandatory Genesis Parameters ---
minminingtxfee=0.00000001
excessiveblocksize=10GB
maxstackmemoryusageconsensus=100MB

# Data directory
datadir=/home/YOUR-PATH/Bitcoin-SV/data

# --- Debug Logging ---
debug=1
